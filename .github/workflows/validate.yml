name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-programs:
    name: Validate program definitions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck schema
        run: npx tsc --noEmit

      - name: Validate all programs
        run: npm run validate

      - name: Validate catalog (if present)
        run: npm run validate:catalog